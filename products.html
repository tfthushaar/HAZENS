<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Hazen - Product Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --bg: #f7f1e6;
    --surface: #ffffff;
    --surface-2: #ffffff;
    --ink: #111110;
    --ink2: #555550;
    --ink3: #999990;
    --rule: #ded6c9;
    --gold: #b08d57;
    --luxury-gold: #d6b96f;
    --luxury-gold-soft: #f0dc9e;
    --product-ink: #111110;
    --product-muted: #68645d;
    --product-soft: #969085;
    --product-rule: #e2e0db;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  #cursor {
    position: fixed; width: 6px; height: 6px;
    background: var(--ink); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    transition: width 0.25s, height 0.25s, background 0.25s;
  }
  #cursor-ring {
    position: fixed; width: 32px; height: 32px;
    border: 1px solid rgba(17,17,16,0.25); border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%);
    transition: width 0.4s cubic-bezier(.25,.46,.45,.94), height 0.4s cubic-bezier(.25,.46,.45,.94), border-color 0.3s;
  }
  body.cursor-hover #cursor { width: 3px; height: 3px; }
  body.cursor-hover #cursor-ring { width: 50px; height: 50px; border-color: rgba(17,17,16,0.5); }
  body.cursor-open #cursor-ring { width: 70px; height: 70px; }

  /* Nav */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 60px;
    background: rgba(247,241,230,0.97);
    border-bottom: 1px solid var(--rule);
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: var(--serif); font-size: 18px; font-weight: 400;
    letter-spacing: 0.18em; color: var(--ink); text-decoration: none;
    cursor: none; text-transform: uppercase;
  }
  .nav-links { display: flex; gap: 32px; align-items: center; }
  .nav-actions { display: flex; align-items: center; gap: 12px; position: relative; }
  .nav-link {
    font-family: var(--sans); font-size: 10px; font-weight: 400; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink2); text-decoration: none;
    background: none; border: none; cursor: none;
    transition: color 0.2s; padding: 4px 0; position: relative;
  }
  .nav-link::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 100%; height: 1px;
    background: var(--ink); transition: right 0.3s cubic-bezier(.25,.46,.45,.94);
  }
  .nav-link:hover, .nav-link.active { color: var(--ink); }
  .nav-link:hover::after, .nav-link.active::after { right: 0; }
  .nav-cta {
    font-family: var(--sans); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    border: 1px solid var(--ink); color: var(--ink);
    padding: 8px 18px; background: none; cursor: none;
    text-decoration: none;
    transition: background 0.25s, color 0.25s;
  }
  .nav-cta:hover { background: var(--ink); border-color: var(--ink); color: var(--white); }

  .search-wrap { position: relative; }
  .search-trigger.active { background: var(--ink); border-color: var(--ink); color: var(--white); }
  .search-panel {
    position: absolute;
    top: calc(100% + 12px);
    right: 0;
    width: min(360px, calc(100vw - 32px));
    padding: 18px 0 10px;
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--rule);
    background: rgba(247,241,230,0.98);
    box-shadow: 0 24px 60px rgba(17,17,16,0.12);
  }
  .search-input {
    width: calc(100% - 28px);
    height: 32px;
    margin: 0 14px;
    border: 0;
    border-bottom: 1px solid var(--rule);
    background: transparent;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.04em;
    outline: none;
    padding: 0 0 10px;
    cursor: none;
  }
  .search-input::placeholder {
    color: var(--ink3);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 9px;
  }
  .search-results {
    margin-top: 14px;
    display: grid;
    max-height: min(360px, 56vh);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(17,17,16,0.3) transparent;
  }
  .search-result {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 14px;
    align-items: center;
    width: 100%;
    padding: 13px 14px;
    border: 0;
    border-bottom: 1px solid var(--rule);
    background: transparent;
    color: var(--ink2);
    text-align: left;
    cursor: none;
    transition: background 0.2s, color 0.2s;
  }
  .search-result:hover,
  .search-result:focus-visible {
    background: var(--white);
    outline: none;
  }
  .search-name {
    display: block;
    font-family: var(--serif);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.15;
    letter-spacing: 0;
  }
  .search-meta,
  .search-count,
  .search-empty {
    display: block;
    font-family: var(--sans);
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink3);
  }
  .search-meta { margin-top: 5px; }
  .search-count { white-space: nowrap; color: var(--ink3); }
  .search-empty {
    padding: 16px 14px 8px;
    text-align: left;
    background: transparent;
  }
  .product-card.is-search-target {
    box-shadow: inset 0 0 0 1px var(--ink);
    z-index: 2;
  }

  /* Loading screen */
  #loader {
    position: fixed; inset: 0; z-index: 1000;
    background:
      radial-gradient(circle at 50% 42%, rgba(255,255,252,0.82) 0%, rgba(247,241,230,0.96) 36%, rgba(226,215,199,0.92) 100%);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.42s cubic-bezier(.4,0,.2,1), transform 0.42s cubic-bezier(.4,0,.2,1);
  }
  #loader.done { opacity: 0; pointer-events: none; transform: translateY(-8px); }
  .loader-stage {
    display: grid;
    justify-items: center;
    gap: 22px;
    width: min(74vw, 420px);
  }
  .loader-brand {
    font-family: var(--serif); font-size: clamp(30px, 6vw, 46px); font-weight: 300;
    letter-spacing: 0.26em; text-transform: uppercase; color: var(--ink);
    text-shadow: none;
    opacity: 0; animation: fadeIn 0.8s 0.2s forwards;
  }
  .loader-aperture {
    position: relative;
    width: 100%;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    opacity: 0; animation: fadeIn 0.5s 0.5s forwards;
  }
  .loader-aperture::before {
    content: '';
    position: absolute;
    left: 8%;
    right: 8%;
    top: 50%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(176,141,87,0.34), rgba(255,245,199,0.86), rgba(176,141,87,0.34), transparent);
    box-shadow: none;
  }
  .loader-aperture::after {
    content: '';
    position: absolute;
    top: 14px;
    bottom: 14px;
    width: 38px;
    background: linear-gradient(90deg, transparent, rgba(255,248,213,0.72), transparent);
    transform: translateX(-180px) skewX(-12deg);
    animation: apertureSweep 1.55s cubic-bezier(.4,0,.2,1) infinite;
  }
  .loader-line {
    width: 38%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(176,141,87,0.52));
  }
  .loader-line:last-child {
    transform: scaleX(-1);
  }
  .loader-core {
    width: 12px;
    height: 12px;
    margin: 0 18px;
    border: 1px solid rgba(176,141,87,0.8);
    transform: rotate(45deg);
    box-shadow: none;
    animation: corePulse 1.55s ease-in-out infinite;
  }
  .loader-counter {
    font-family: var(--sans); font-size: 10px; letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink3); font-weight: 300;
    opacity: 0; animation: fadeIn 0.5s 0.7s forwards;
  }
  @keyframes apertureSweep {
    0% { transform: translateX(-190px) skewX(-12deg); opacity: 0; }
    18% { opacity: 1; }
    82% { opacity: 1; }
    100% { transform: translateX(190px) skewX(-12deg); opacity: 0; }
  }
  @keyframes corePulse {
    0%, 100% { transform: rotate(45deg) scale(0.82); opacity: 0.72; }
    50% { transform: rotate(45deg) scale(1.18); opacity: 1; }
  }

  /* Hero */
  #hero {
    min-height: 100vh; display: block;
    border-bottom: 1px solid var(--rule);
    position: relative; overflow: hidden;
    padding-top: 60px;
    background: var(--bg);
  }
  #hero::before {
    content: '';
    position: absolute; inset: 60px 0 0;
    z-index: 1;
    background: linear-gradient(90deg, rgba(247,241,230,0.82) 0%, rgba(247,241,230,0.62) 34%, rgba(247,241,230,0.18) 62%, rgba(247,241,230,0.04) 100%);
    pointer-events: none;
  }
  .hero-left {
    min-height: calc(100vh - 60px);
    display: flex; flex-direction: column; justify-content: center;
    max-width: min(900px, 60vw);
    padding: 92px 0 82px clamp(48px, 7vw, 118px);
    position: relative; z-index: 2;
  }
  .hero-right {
    position: absolute; inset: 60px 0 0;
    overflow: hidden;
    background: var(--bg);
    z-index: 0;
  }
  .hero-right-img {
    position: absolute; inset: 0;
    background:
      url('images/hero-backdrop.jpg'),
      url('HD photo-252 Items/HL77029 Sand Black.jpg');
    background-position: center center;
    background-size: cover;
    background-repeat: no-repeat;
    opacity: 1; animation: none;
  }
  .hero-right-img::after { display: none; }
  .hero-right-overlay {
    display: none;
  }
  .hero-right-vignette {
    display: none;
  }
  .hero-top-label {
    position: absolute; top: 104px; left: clamp(48px, 7vw, 118px); z-index: 2;
    font-size: 10px; letter-spacing: 0.34em; text-transform: uppercase;
    color: rgba(17,17,16,0.58);
    opacity: 1; animation: none;
  }
  .hero-year {
    position: absolute; top: 104px; right: clamp(48px, 6vw, 96px);
    font-family: var(--serif); font-size: 14px; letter-spacing: 0.12em;
    color: rgba(17,17,16,0.58);
    opacity: 1; animation: none; z-index: 2;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: clamp(90px, 12vw, 190px);
    font-weight: 300; line-height: 0.88;
    letter-spacing: 0.16em; color: var(--ink);
    text-shadow: none;
    text-transform: uppercase;
  }
  .hero-title-line { display: block; overflow: hidden; }
  .hero-title-inner {
    display: block;
    transform: translateY(0);
    animation: none;
  }
  .hero-title-line:nth-child(1) .hero-title-inner { animation-delay: 1.1s; }
  .hero-title-line:nth-child(2) .hero-title-inner { animation-delay: 1.25s; font-style: italic; }
  .hero-tagline {
    margin-top: 22px;
    font-family: var(--serif);
    font-size: clamp(34px, 4.5vw, 68px);
    line-height: 1;
    font-style: italic;
    color: var(--ink);
  }
  .hero-bottom {
    display: block;
    margin-top: 36px;
    opacity: 1; animation: none;
  }
  .hero-desc {
    max-width: 360px; font-size: 13px; line-height: 2;
    color: rgba(17,17,16,0.7); font-weight: 300; letter-spacing: 0.01em;
    text-shadow: none;
  }
  .hero-scroll-indicator {
    position: absolute; right: clamp(34px, 5vw, 78px); bottom: 70px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    z-index: 2;
  }
  .hero-scroll-indicator span {
    font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(17,17,16,0.5);
    writing-mode: vertical-rl;
  }
  .hero-line-anim {
    width: 1px; height: 60px;
    background: rgba(17,17,16,0.6);
    animation: lineGrow 2s 1.8s ease-out infinite;
  }
  @keyframes lineGrow {
    0% { transform: scaleY(0); transform-origin: top; opacity: 1; }
    70% { transform: scaleY(1); transform-origin: top; opacity: 1; }
    100% { transform: scaleY(1); transform-origin: top; opacity: 0; }
  }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes slideUp { to { transform: translateY(0); } }

  /* Section */
  .cat-section {
    border-bottom: 1px solid var(--rule);
    background: var(--bg);
  }

  /* Section header */
  .section-header {
    display: grid; grid-template-columns: 1fr 1fr;
    padding: 68px 48px 52px; gap: 40px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg);
  }
  .section-header-left { }
  .section-index {
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--ink3); margin-bottom: 20px;
  }
  .section-title {
    font-family: var(--serif);
    font-size: clamp(48px, 6vw, 88px);
    font-weight: 300; line-height: 0.92; letter-spacing: 0; color: var(--ink);
  }
  .section-title em { font-style: italic; font-weight: 300; color: var(--ink); }
  .section-header-right {
    display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 4px;
  }
  .section-desc {
    font-size: 13px; line-height: 2.1; color: var(--ink2);
    font-weight: 300; max-width: 380px;
  }
  .section-count {
    font-family: var(--serif); font-size: 11px; letter-spacing: 0.15em;
    color: var(--ink3); text-transform: uppercase; margin-top: 24px;
  }

  /* Product grid */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-left: 1px solid var(--product-rule);
    background: var(--white);
  }
  .product-card {
    background: var(--white);
    cursor: none; position: relative;
    border-right: 1px solid var(--product-rule);
    border-bottom: 1px solid var(--product-rule);
    transition: background 0.2s;
  }
  .product-card.has-variants .product-img-wrap::before {
    content: '';
    position: absolute; inset: 12px;
    border: 1px solid rgba(176,141,87,0.14);
    pointer-events: none; z-index: 1;
  }
  .product-img-wrap {
    width: 100%; aspect-ratio: 1 / 1;
    background: #ffffff;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .product-img-wrap img {
    width: 100%; height: 100%; object-fit: contain;
    padding: 24px;
    transition: transform 0.7s cubic-bezier(.16,1,.3,1);
  }
  .product-card:hover .product-img-wrap img { transform: scale(1.018); }
  .product-hover-line {
    position: absolute; bottom: 0; left: 0; right: 100%; height: 1px;
    background: var(--ink); transition: right 0.4s cubic-bezier(.25,.46,.45,.94);
  }
  .product-card:hover .product-hover-line { right: 0; }
  .product-info {
    padding: 20px 22px 24px;
    border-top: 1px solid var(--product-rule);
    background: var(--white);
  }
  .product-sku {
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--product-soft); margin-bottom: 6px; font-family: var(--sans);
  }
  .product-name {
    font-family: var(--serif); font-size: 18px; font-weight: 400;
    color: var(--product-ink); line-height: 1.2; margin-bottom: 4px;
  }
  .product-finish {
    font-size: 10px; color: var(--product-soft); letter-spacing: 0.05em;
  }
  .product-view {
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--product-soft); margin-top: 12px;
    display: inline-block; border-bottom: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .product-card:hover .product-view { color: var(--product-ink); border-color: rgba(17,17,16,0.46); }
  .variant-count {
    position: absolute; top: 14px; right: 14px; z-index: 2;
    font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink2); background: rgba(255,255,255,0.9);
    border: 1px solid rgba(176,141,87,0.26); padding: 6px 8px;
  }

  /* Detail overlay */
  .detail-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(250,250,248,0.98);
    backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  .detail-overlay.open { opacity: 1; pointer-events: all; }
  .detail-inner {
    display: grid; grid-template-columns: 1fr 1fr;
    width: 88vw; max-width: 1080px; height: 82vh; max-height: 680px;
    border: 1px solid var(--rule);
    transform: translateY(18px);
    transition: transform 0.38s cubic-bezier(.16,1,.3,1);
    background: var(--white);
  }
  .detail-overlay.open .detail-inner { transform: translateY(0); }
  .detail-img-side {
    background: #ffffff;
    display: flex; align-items: center; justify-content: center;
    border-right: 1px solid var(--rule); overflow: hidden;
    position: relative;
  }
  .detail-variant-rail {
    width: 100%; height: 100%;
    display: flex; overflow-x: auto; overflow-y: hidden;
    scroll-snap-type: x mandatory; scroll-behavior: smooth;
    scrollbar-width: thin; scrollbar-color: var(--gold) transparent;
  }
  .detail-variant-rail::-webkit-scrollbar { height: 6px; }
  .detail-variant-rail::-webkit-scrollbar-thumb { background: rgba(176,141,87,0.55); }
  .detail-variant-panel {
    flex: 0 0 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    scroll-snap-align: center; position: relative;
  }
  .detail-variant-panel img { width: 100%; height: 100%; object-fit: contain; padding: 64px; }
  .detail-variant-caption {
    position: absolute; left: 28px; bottom: 24px;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--product-muted); background: rgba(255,255,255,0.86);
    border: 1px solid var(--product-rule); padding: 8px 10px;
  }
  .variant-strip {
    display: flex; gap: 12px; overflow-x: auto;
    flex: 0 0 auto;
    min-height: 94px;
    padding: 4px 2px 8px;
    scrollbar-width: none; margin-bottom: 28px;
  }
  .variant-strip::-webkit-scrollbar { display: none; }
  .variant-thumb {
    flex: 0 0 82px; width: 82px; height: 82px;
    background: #fff; border: 1px solid var(--product-rule);
    display: flex; align-items: center; justify-content: center;
    cursor: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .variant-thumb.active {
    border-color: var(--ink);
    box-shadow: none;
  }
  .variant-thumb img {
    display: block;
    width: auto; height: auto;
    max-width: 78%; max-height: 78%;
    object-fit: contain;
  }
  .detail-info-side {
    padding: 60px 52px; display: flex; flex-direction: column; justify-content: flex-start;
    overflow-y: auto;
    background: var(--white);
    min-height: 0;
  }
  .detail-cat { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink3); margin-bottom: 20px; }
  .detail-name {
    font-family: var(--serif); font-size: 48px; font-weight: 300; line-height: 1; margin-bottom: 8px; letter-spacing: 0;
    color: var(--ink);
  }
  .detail-sku { font-size: 11px; color: var(--ink3); letter-spacing: 0.15em; margin-bottom: 32px; }
  .detail-rule { width: 36px; height: 1px; background: var(--ink); margin-bottom: 32px; }
  .detail-body { flex: 0 0 auto; font-size: 13px; line-height: 2.1; color: var(--ink2); margin-bottom: 28px; }
  .detail-specs {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    border-top: 1px solid var(--rule);
    border-left: 1px solid var(--rule);
    margin-bottom: 30px;
    flex: 0 0 auto;
  }
  .detail-spec {
    min-width: 0;
    padding: 12px 14px 13px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    background: rgba(247,241,230,0.18);
  }
  .detail-spec-label {
    display: block;
    margin-bottom: 5px;
    font-family: var(--sans);
    font-size: 8px;
    letter-spacing: 0.18em;
    line-height: 1.4;
    text-transform: uppercase;

const PRODUCT_NAMES = {
  downlights: 'Architectural Downlight',
  wall: 'Wall Light',
  outdoor: 'Outdoor Fixture',
  tracks: 'Track System Component',
  decorative: 'Decorative Fixture',
  pendants: 'Pendant Light',
};

const formatModelCode = value => value
  .replace(/-TRACK$/i, '')
  .replace(/-CORNERS$/i, ' Corner')
  .replace(/-/g, ' ')
  .replace(/\s+/g, ' ')
  .trim()
  .toUpperCase();

const titleCase = value => value
  .replace(/\s+/g, ' ')
  .trim()
  .split(' ')
  .map(part => part ? part.charAt(0).toUpperCase() + part.slice(1) : part)
  .join(' ');

const stripExtension = file => file.replace(/\.(jpe?g|png)$/i, '').trim().replace(/\s+/g, ' ');

const cleanSku = value => value
  .replace(/-(Sand|Matt|Pearl|Rose|Black|White|Grey|Gray|Old|Track).*$/i, '')
  .replace(/-?砂白.*$/i, '')
  .replace(/[()]/g, '')
  .replace(/-+$/g, '')
  .trim();

function deriveSku(file) {
  const name = stripExtension(file);
  if (/^(GD\s|GD-A2\s|GD-[MNQ]48V\s|CL-Power\s|CL-[MQW]\s)/i.test(name)) {
    return cleanSku(name.replace(/\s+/g, '-'));
  }
  return cleanSku(name.split(/\s+/)[0]);
}

function deriveGroupKey(sku) {
  const upper = sku.toUpperCase();
  let match = upper.match(/^(CL-[MQW])(?:500|1000)$/);
  if (match) return `${match[1]}-TRACK`;
  match = upper.match(/^(GD-[MNQ]48V)-(?:1(?:\.5)?M|2M)$/);
  if (match) return `${match[1]}-TRACK`;
  match = upper.match(/^(GD-[MNQ]48V)-(?:INNER-|OUT-|CORNER|CONNER)/);
  if (match) return `${match[1]}-CORNERS`;
  match = upper.match(/^(CL-POWER-HEAD)(?:-[BC])?$/);
  if (match) return match[1];
  match = upper.match(/^([A-Z]+)(\d+)(?:CH|-[A-Z]|\-\d.*)?$/);
  if (match) return `${match[1]}${match[2]}`;
  return upper;
}

function deriveCategoryId(file, sku) {
  if (/^(DL|DLC|SL|SLC|CL7)/i.test(sku)) return 'downlights';
  if (/^WLB/i.test(sku)) return 'wall';
  if (/^(OL|FL)/i.test(sku)) return 'outdoor';
  if (/^(CL-|TL|TD|GD-(?:A2|M48V|N48V|Q48V|CORNER|MOUNTING|POWER|TRACK))/i.test(sku)) return 'tracks';
  if (/^HL/i.test(sku)) return 'pendants';
  return 'decorative';
}

function productNameFor(categoryId, groupKey) {
  const code = formatModelCode(groupKey);
  if (/^DLC/.test(groupKey)) return `${code} Ceiling Downlight`;
  if (/^DL/.test(groupKey)) return `${code} Recessed Downlight`;
  if (/^SLC/.test(groupKey)) return `${code} Ceiling Spotlight`;
  if (/^SL/.test(groupKey)) return `${code} Surface Spotlight`;
  if (/^CL7/.test(groupKey)) return `${code} Compact Ceiling Light`;
  if (/^WLB/.test(groupKey)) return `${code} Wall Bracket Light`;
  if (/^FL/.test(groupKey)) return `${code} Step / Floor Light`;
  if (/^OL/.test(groupKey)) return `${code} Outdoor Light`;
  if (/^CL-[MQW]-TRACK/.test(groupKey)) return `${code} Track Rail`;
  if (/^GD-[MNQ]48V-TRACK/.test(groupKey)) return `${code} Magnetic Track Rail`;
  if (/^GD-[MNQ]48V-CORNERS/.test(groupKey)) return `${code} Track Corner Connector`;
  if (/^CL-POWER-HEAD/.test(groupKey)) return `${code} Track Power Head`;
  if (/^GD-(?:A2|CORNER|MOUNTING|POWER|TRACK)/.test(groupKey)) return `${code} Track Accessory`;
  if (/^TL/.test(groupKey)) return `${code} Track Spotlight`;
  if (/^TD/.test(groupKey)) return `${code} Track Decorative Light`;
  if (/^HL/.test(groupKey)) return `${code} Pendant Light`;
  if (/^MLL/.test(groupKey)) return `${code} Decorative Linear Light`;
  if (/^LL/.test(groupKey)) return `${code} Linear Light`;
  if (/^GD/.test(groupKey)) return `${code} Decorative Fixture`;
  return `${code} ${PRODUCT_NAMES[categoryId] || 'Lighting Fixture'}`;
}

function productDescriptionFor(product, catLabel, variant) {
  const sku = (variant?.sku || product?.sku || '').toUpperCase();
  const finish = variant?.finish || product?.finish || 'selected finish';
  const name = product?.name || 'This fixture';
  const summary = specSummaryFor(product, catLabel, variant);
  if (/^DLC|^DL/.test(sku)) {
    return `${name} is a recessed downlight for clean ceiling integration, controlled beam output, and low-glare architectural illumination. The ${finish} version is suited to refined residential, hospitality, and commercial interiors.${summary}`;
  }
  if (/^SLC|^SL/.test(sku)) {
    return `${name} is designed for focused accent lighting, display highlights, and directional ceiling illumination. Its ${finish} finish keeps the fixture visually restrained while delivering precise light placement.${summary}`;
  }
  if (/^CL7/.test(sku)) {
    return `${name} is a compact ceiling light for tight layouts and minimal visual intrusion. It supports general lighting needs where a small profile and controlled output are essential.${summary}`;
  }
  if (/^WLB/.test(sku)) {
    return `${name} shapes vertical surfaces with soft architectural light, ideal for corridors, feature walls, bedside zones, and facade-like interior moments. The ${finish} finish keeps the wall detail refined.${summary}`;
  }
  if (/^OL/.test(sku)) {
    return `${name} is an exterior-rated lighting fixture for facades, pathways, landscape edges, and outdoor architectural accents. The ${finish} version is selected for durable, discreet exterior installations.${summary}`;
  }
  if (/^FL/.test(sku)) {
    return `${name} is made for step, floor, and low-level guide lighting where glare control and safe visual orientation matter. Its ${finish} finish blends into architectural surfaces.${summary}`;
  }
  if (/^(CL-|GD-[MNQ]48V|GD-A2|GD-CORNER|GD-MOUNTING|GD-POWER|GD-TRACK)/.test(sku)) {
    return `${name} is a track and profile component for building modular lighting runs with clean alignment, flexible placement, and seamless architectural integration.${summary}`;
  }
  if (/^TL/.test(sku)) {
    return `${name} is a track-mounted spotlight for adjustable accent lighting, retail display, galleries, and flexible interior scenes where beam direction needs to change over time.${summary}`;
  }
  if (/^TD/.test(sku)) {
    return `${name} adds a decorative element to track systems while preserving the flexibility of modular lighting. It works well for layered interiors that need both focus and atmosphere.${summary}`;
  }
  if (/^HL/.test(sku)) {
    return `${name} is a suspended pendant for visual focus over lounges, dining zones, reception areas, and hospitality spaces. The ${finish} finish gives the fixture a polished architectural presence.${summary}`;
  }
  if (/^MLL|^LL/.test(sku)) {
    return `${name} is a decorative linear light for continuous visual rhythm, indirect glow, and elegant feature lighting across walls, ceilings, or joinery details.${summary}`;
  }
  if (/^GD/.test(sku)) {
    return `${name} is a decorative lighting fixture for statement moments, ambient layering, and refined focal points within luxury interiors.${summary}`;
  }
  return `${name} belongs to the ${catLabel} range and is selected for architectural light quality, controlled output, and a refined ${finish} finish.${summary}`;
}

function deriveVariantLabel(file, sku) {
  const name = stripExtension(file);
  let label = name.replace(new RegExp('^' + sku.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i'), '');
  if (label === name) label = name.slice(name.split(/\s+/)[0].length);
  label = label.replace(/^[-\s]+/, '').replace(/-/g, ' ').replace(/\s+/g, ' ').trim();
  return titleCase(label || 'Standard');
}

function buildCatalog() {
  const categories = CATEGORY_DEFS.map(def => {
    const { products, ...meta } = def;
    return { ...meta, products: [], variantCount: 0, _groups: {} };
  });
  const byId = Object.fromEntries(categories.map(category => [category.id, category]));

  ASSET_FILES.forEach(file => {
    const sku = deriveSku(file);
    const groupKey = deriveGroupKey(sku);
    const category = byId[deriveCategoryId(file, sku)] || byId.decorative;
    const variant = {
      id: file,
      sku,
      file,
      img: encodeURI(`${ASSET_ROOT}/${file}`),
      finish: deriveVariantLabel(file, sku),
    };
    if (!category._groups[groupKey]) category._groups[groupKey] = [];
    category._groups[groupKey].push(variant);
  });

  return categories.map(category => {
    const products = Object.entries(category._groups)
      .sort(([a], [b]) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }))
      .map(([groupKey, variants]) => {
        const sorted = variants.sort((a, b) => `${a.sku} ${a.finish}`.localeCompare(`${b.sku} ${b.finish}`, undefined, { numeric: true, sensitivity: 'base' }));
        const primary = sorted.find(variant => /black/i.test(variant.finish)) || sorted[0];
        return {
          id: groupKey,
          sku: groupKey,
          name: productNameFor(category.id, groupKey),
          finish: sorted.length > 1 ? `${sorted.length} versions` : primary.finish,
          img: primary.img,
          variants: sorted,
        };
      });
    const { _groups, ...meta } = category;
    return {
      ...meta,
      products,
      variantCount: products.reduce((total, product) => total + product.variants.length, 0),
    };
  });
}

const CATEGORIES = buildCatalog();

const normalizeSearch = value => String(value || '')
  .toLowerCase()
  .replace(/[^a-z0-9]+/g, ' ')
  .trim();

const productDomId = product => `product-${normalizeSearch(product?.id || product?.sku).replace(/\s+/g, '-')}`;

const DETAIL_SPEC_FIELDS = [
  { key: 'article', label: 'Article' },
  { key: 'itemNo', label: 'Item No' },
  { key: 'type', label: 'Type' },
  { key: 'area', label: 'Area / Application' },
  { key: 'bodyColor', label: 'Body Colour' },
  { key: 'cct', label: 'CCT' },
  { key: 'beamAngle', label: 'Beam Angle' },
  { key: 'material', label: 'Material' },
  { key: 'ipRate', label: 'IP Rating' },
  { key: 'lumen', label: 'Lumen' },
  { key: 'power', label: 'Power' },
];

const PRODUCT_SPEC_ALIASES = {
  'CL-POWER-CONNECTOR': ['CL-POWER-ACCESSORIES'],
  'CL-POWER-CORNER-CONNECTOR': ['CL-POWER-ACCESSORIES'],
  'CL-POWER-HEAD': ['CL-POWER-ACCESSORIES'],
  'GD-A2-POWER-CONNECTOR': ['GD-A2-POWER-ACCESSORIES'],
  'GD-A2-POWER-CORNER-CONNECTOR': ['GD-A2-POWER-ACCESSORIES'],
  'GD-A2-POWER-HEAD': ['GD-A2-POWER-ACCESSORIES'],
  SLC74265: ['SL74265'],
};

const PRODUCT_SPEC_OVERRIDES = {
  GD: {
    article: ['PRATO'],
    itemNo: ['GD Decorative parts'],
    type: ['Track'],
    area: ['PRATO Track Lights- Surface & Recessed'],
    bodyColor: ['Black'],
  },
};

const normalizeSpecKey = value => String(value || '')
  .toUpperCase()
  .replace(/\u00D7/g, 'X')
  .replace(/\uFF08OLD\uFF09/gi, '')
  .replace(/\(OLD\)/gi, '')
  .replace(/\s+/g, '-')
  .replace(/[()]/g, '')
  .replace(/-+$/g, '')
  .trim();

const expandSpecKey = value => {
  const key = normalizeSpecKey(value);
  if (!key) return [];
  return [
    key,
    key.replace(/-\d+(?:\.\d+)?X\d+(?:\.\d+)?W$/, ''),
    key.replace(/-\d+(?:\.\d+)?W$/, ''),
    key.replace(/-\d+(?:\.\d+)?$/, ''),
    key.replace(/-8W$/, ''),
  ].filter(Boolean);
};

const cleanSpecValue = value => String(value || '')
  .replace(/\s*-\s*\d+\s*Nos\b/gi, '')
  .replace(/\s+\d+\s*Nos\b/gi, '')
  .replace(/\s+Time\s+\(Match the number of.*$/i, '')
  .replace(/\s*\(Match the number of.*$/i, '')
  .replace(/\s+/g, ' ')
  .replace(/\s*\/\s*$/g, '')
  .trim();

const uniqueValues = values => Array.from(new Set(
  (values || [])
    .flatMap(value => Array.isArray(value) ? value : [value])
    .map(cleanSpecValue)
    .filter(value => value && value !== '/')
));

function joinSpecValues(values, limit = 5) {
  const clean = uniqueValues(values);
  if (!clean.length) return '';
  if (clean.length <= limit) return clean.join(' / ');
  return `${clean.slice(0, limit).join(' / ')} + ${clean.length - limit} more`;
}

function mergeProductSpecs(specs) {
  return specs.reduce((merged, spec) => {
    Object.entries(spec || {}).forEach(([key, value]) => {
      merged[key] = uniqueValues([...(merged[key] || []), ...(Array.isArray(value) ? value : [value])]);
    });
    return merged;
  }, {});
}

function getProductSpec(product, variant) {
  const rawKeys = [
    variant?.sku,
    product?.sku,
    product?.id,
    ...(product?.variants || []).map(item => item.sku),
  ];
  const expandedKeys = uniqueValues(rawKeys.flatMap(expandSpecKey));
  const keys = uniqueValues(expandedKeys.flatMap(key => [key, ...(PRODUCT_SPEC_ALIASES[key] || [])]));
  const matches = keys.map(key => PRODUCT_SPECS[key] || PRODUCT_SPEC_OVERRIDES[key]).filter(Boolean);
  return mergeProductSpecs(matches);
}

function detailSpecRowsFor(product, catLabel, variant) {
  const spec = getProductSpec(product, variant);
  const fallback = {
    article: [product?.name],
    itemNo: [variant?.sku || product?.sku],
    type: [catLabel],
    area: [catLabel],
    bodyColor: [variant?.finish || product?.finish],
  };

  return DETAIL_SPEC_FIELDS.map(field => ({
    ...field,
    value: joinSpecValues(spec[field.key] || fallback[field.key]) || 'Available on request',
  }));
}

function specSummaryFor(product, catLabel, variant) {
  const spec = getProductSpec(product, variant);
  const parts = [
    joinSpecValues(spec.type, 2),
    joinSpecValues(spec.cct, 2) && `${joinSpecValues(spec.cct, 2)} CCT`,
    joinSpecValues(spec.beamAngle, 2) && `${joinSpecValues(spec.beamAngle, 2)} beam`,
    joinSpecValues(spec.lumen, 2) && `${joinSpecValues(spec.lumen, 2)} output`,
    joinSpecValues(spec.ipRate, 2) && `${joinSpecValues(spec.ipRate, 2)} rated`,
  ].filter(Boolean);
  return parts.length ? ` Documented specification: ${parts.join(', ')}.` : '';
}

function detailTagsFor(product, catLabel, variant) {
  const spec = getProductSpec(product, variant);
  return uniqueValues([
    joinSpecValues(spec.cct, 2),
    joinSpecValues(spec.beamAngle, 2),
    joinSpecValues(spec.ipRate, 2),
    joinSpecValues(spec.material, 2),
    joinSpecValues(spec.power, 2),
    variant?.finish || product?.finish,
  ]).slice(0, 6);
}

const PRODUCT_SEARCH_INDEX = CATEGORIES.flatMap(category => category.products.map(product => {
  const variantText = product.variants
    .map(variant => `${variant.sku} ${variant.finish} ${variant.file}`)
    .join(' ');
  const specText = joinSpecValues(Object.values(getProductSpec(product, product.variants[0])).flat(), 40);
  const searchText = normalizeSearch([
    product.sku,
    product.name,
    product.finish,
    category.label,
    category.short,
    category.titleLine1,
    category.titleLine2,
    variantText,
    specText,
  ].join(' '));
  return { product, categoryId: category.id, categoryLabel: category.label, searchText };
}));

function scoreSearchResult(item, query) {
  const normalized = normalizeSearch(query);
  if (!normalized) return -1;
  const tokens = normalized.split(/\s+/).filter(Boolean);
  if (!tokens.every(token => item.searchText.includes(token))) return -1;

  const sku = normalizeSearch(item.product.sku);
  const name = normalizeSearch(item.product.name);
  let score = 10;
  if (sku === normalized) score += 120;
  if (sku.startsWith(normalized)) score += 70;
  if (name.startsWith(normalized)) score += 55;
  if (name.includes(normalized)) score += 35;
  score -= Math.max(0, name.length - normalized.length) * 0.02;
  return score;
}

function SearchPanel({ open, onClose, onSelect }) {
  const [query, setQuery] = useState('');
  const inputRef = useRef(null);

  useEffect(() => {
    if (!open) setQuery('');
  }, [open]);

  useEffect(() => {
    if (!open) return;
    const timer = window.setTimeout(() => inputRef.current?.focus(), 40);
    const onKey = event => { if (event.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => {
      window.clearTimeout(timer);
      window.removeEventListener('keydown', onKey);
    };
  }, [open, onClose]);

  if (!open) return null;

  const results = PRODUCT_SEARCH_INDEX
    .map(item => ({ ...item, score: scoreSearchResult(item, query) }))
    .filter(item => item.score >= 0)
    .sort((a, b) => b.score - a.score || a.product.name.localeCompare(b.product.name, undefined, { numeric: true, sensitivity: 'base' }))
    .slice(0, 8);

  const submitSearch = event => {
    event.preventDefault();
    if (results[0]) onSelect(results[0]);
  };

  return (
    <div className="search-panel" role="dialog" aria-label="Product search">
      <form onSubmit={submitSearch}>
        <input
          ref={inputRef}
          className="search-input"
          value={query}
          onChange={event => setQuery(event.target.value)}
          placeholder="Search SKU, finish, category"
          aria-label="Search products"
        />
      </form>
      {query.trim() && (
        <div className="search-results">
          {results.length ? results.map(item => (
            <button
              key={item.product.id}
              type="button"
              className="search-result"
              onClick={() => onSelect(item)}>
              <span>
                <span className="search-name">{item.product.name}</span>
                <span className="search-meta">{item.product.sku} / {item.categoryLabel}</span>
              </span>
              <span className="search-count">{item.product.variants.length} version{item.product.variants.length === 1 ? '' : 's'}</span>
            </button>
          )) : (
            <div className="search-empty">No matching product</div>
          )}
        </div>
      )}
    </div>
  );
}

function ProductCard({ product, catLabel, onClick, isHighlighted }) {
  const hasVariants = product.variants.length > 1;
  return (
    <div
      id={productDomId(product)}
      className={`product-card${hasVariants ? ' has-variants' : ''}${isHighlighted ? ' is-search-target' : ''}`}
      onClick={() => onClick(product, catLabel)}>
      <div className="product-img-wrap">
        <img src={product.img} alt={product.name} loading="lazy" />
        {hasVariants && <div className="variant-count">{product.variants.length} versions</div>}
        <div className="product-hover-line"></div>
      </div>
      <div className="product-info">
        <div className="product-sku">{product.sku}</div>
        <div className="product-name">{product.name}</div>
        <div className="product-finish">{product.finish}</div>
        <div className="product-view">View details &rarr;</div>
      </div>
    </div>
  );
}

function DetailOverlay({ product, catLabel, onClose }) {
  const open = !!product;
  const [activeVariant, setActiveVariant] = useState(0);
  const variantRailRef = useRef(null);
  const variants = product?.variants || [];
  const currentVariant = variants[activeVariant] || variants[0];

  useEffect(() => {
    setActiveVariant(0);
    if (variantRailRef.current) variantRailRef.current.scrollLeft = 0;
  }, [product?.id]);

  useEffect(() => {
    if (open) { document.body.style.overflow = 'hidden'; document.body.classList.add('cursor-open'); }
    else { document.body.style.overflow = ''; document.body.classList.remove('cursor-open'); }
    return () => { document.body.style.overflow = ''; document.body.classList.remove('cursor-open'); };
  }, [open]);

  const handleKey = e => { if (e.key === 'Escape') onClose(); };
  useEffect(() => {
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, []);

  const scrollToVariant = index => {
    setActiveVariant(index);
    const rail = variantRailRef.current;
    if (rail) rail.scrollTo({ left: rail.clientWidth * index, behavior: 'smooth' });
  };

  const syncVariantFromScroll = event => {
    const rail = event.currentTarget;
    const index = Math.round(rail.scrollLeft / Math.max(rail.clientWidth, 1));
    if (index !== activeVariant) setActiveVariant(index);
  };

  const detailRows = product ? detailSpecRowsFor(product, catLabel, currentVariant) : [];
  const detailTags = product ? detailTagsFor(product, catLabel, currentVariant) : [];

  return (
    <div className={`detail-overlay${open ? ' open' : ''}`} onClick={e => e.target === e.currentTarget && onClose()}>
      <button className="detail-close" onClick={onClose}>&times; Close</button>
      <div className="detail-inner">
        <div className="detail-img-side">
          {product && (
            <div className="detail-variant-rail" ref={variantRailRef} onScroll={syncVariantFromScroll}>
              {variants.map((variant, index) => (
                <div className="detail-variant-panel" key={variant.id}>
                  <img src={variant.img} alt={`${product.name} ${variant.finish}`} />
                  {variants.length > 1 && <div className="detail-variant-caption">{index + 1} / {variants.length}</div>}
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="detail-info-side">
          {product && <>
            <div className="detail-cat">{catLabel}</div>
            <div className="detail-name">{product.name}</div>
            <div className="detail-sku">{currentVariant?.sku || product.sku}</div>
            <div className="detail-rule"></div>
            <div className="detail-body">
              {productDescriptionFor(product, catLabel, currentVariant)}
            </div>
            <div className="detail-specs">
              {detailRows.map(row => (
                <div className="detail-spec" key={row.key}>
                  <span className="detail-spec-label">{row.label}</span>
                  <span className="detail-spec-value">{row.value}</span>
                </div>
              ))}
            </div>
            {variants.length > 1 && <>
              <div className="variant-strip">
                {variants.map((variant, index) => (
                  <button
                    key={variant.id}
                    className={`variant-thumb${index === activeVariant ? ' active' : ''}`}
                    onClick={() => scrollToVariant(index)}
                    aria-label={`View ${variant.finish}`}>
                    <img src={variant.img} alt="" />
                  </button>
                ))}
              </div>
            </>}
            <div className="detail-tags">
              {detailTags.map(tag => <span className="detail-tag" key={tag}>{tag}</span>)}
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [activeId, setActiveId] = useState(null);
  const [detailProduct, setDetailProduct] = useState(null);
  const [detailCat, setDetailCat] = useState('');
  const [searchOpen, setSearchOpen] = useState(false);
  const [highlightedProductId, setHighlightedProductId] = useState(null);
  const ringPos = useRef({ x: 0, y: 0 });
  const cursorPos = useRef({ x: 0, y: 0 });
  const rafRef = useRef(null);
  const searchWrapRef = useRef(null);
  const highlightTimerRef = useRef(null);

  useEffect(() => {
    const loader = document.getElementById('loader');
    const finishLoading = () => loader && loader.classList.add('done');
    const timer = window.setTimeout(finishLoading, 700);
    window.addEventListener('load', finishLoading, { once: true });
    return () => {
      window.clearTimeout(timer);
      window.removeEventListener('load', finishLoading);
    };
  }, []);

  useEffect(() => {
    if (!searchOpen) return;
    const onPointerDown = event => {
      if (searchWrapRef.current && !searchWrapRef.current.contains(event.target)) {
        setSearchOpen(false);
      }
    };
    window.addEventListener('mousedown', onPointerDown);
    return () => window.removeEventListener('mousedown', onPointerDown);
  }, [searchOpen]);

  useEffect(() => () => window.clearTimeout(highlightTimerRef.current), []);

  // Cursor
  useEffect(() => {
    const supportsCustomCursor = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    if (!cursor || !ring) return;
    if (!supportsCustomCursor) {
      cursor.remove();
      ring.remove();
      document.body.classList.remove('cursor-hover', 'cursor-open');
      return;
    }
    const onMove = e => {
      cursorPos.current = { x: e.clientX, y: e.clientY };
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    };
    const lerp = (a, b, t) => a + (b - a) * t;
    const tick = () => {
      ringPos.current.x = lerp(ringPos.current.x, cursorPos.current.x, 0.1);
      ringPos.current.y = lerp(ringPos.current.y, cursorPos.current.y, 0.1);
      ring.style.left = ringPos.current.x + 'px';
      ring.style.top = ringPos.current.y + 'px';
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    window.addEventListener('mousemove', onMove);
    const onEnter = () => document.body.classList.add('cursor-hover');
    const onLeave = () => document.body.classList.remove('cursor-hover');
    const hoverTargets = document.querySelectorAll('button, a, .product-card, .variant-thumb');
    hoverTargets.forEach(el => {
      el.addEventListener('mouseenter', onEnter);
      el.addEventListener('mouseleave', onLeave);
    });
    return () => {
      window.removeEventListener('mousemove', onMove);
      hoverTargets.forEach(el => {
        el.removeEventListener('mouseenter', onEnter);
        el.removeEventListener('mouseleave', onLeave);
      });
      cancelAnimationFrame(rafRef.current);
    };
  }, []);

  // Active section tracking
  useEffect(() => {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActiveId(e.target.dataset.catId); });
    }, { rootMargin: '-35% 0px -55% 0px' });
    CATEGORIES.forEach(c => {
      const el = document.getElementById('cat-' + c.id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  const scrollToCategory = id => {
    setActiveId(id);
    const el = document.getElementById('cat-' + id);
    if (el) {
      const offset = el.getBoundingClientRect().top + window.scrollY - 84;
      window.scrollTo({ top: offset, behavior: 'smooth' });
    }
  };

  const scrollToProduct = item => {
    setSearchOpen(false);
    setActiveId(item.categoryId);
    setHighlightedProductId(item.product.id);
    window.clearTimeout(highlightTimerRef.current);
    window.setTimeout(() => {
      const el = document.getElementById(productDomId(item.product));
      if (el) {
        const offset = el.getBoundingClientRect().top + window.scrollY - 88;
        window.scrollTo({ top: offset, behavior: 'smooth' });
      }
    }, 20);
    highlightTimerRef.current = window.setTimeout(() => setHighlightedProductId(null), 3200);
  };

  return (
    <>
      {/* Nav */}
      <nav>
        <a className="nav-logo" href="index.html">Hazen</a>
        <div className="nav-links">
          {CATEGORIES.map(c => (
            <button key={c.id} className={`nav-link${activeId === c.id ? ' active' : ''}`}
              onClick={() => scrollToCategory(c.id)}>
              {c.short}
            </button>
          ))}
        </div>
        <div className="nav-actions">
          <div className="search-wrap" ref={searchWrapRef}>
            <button
              type="button"
              className={`nav-cta search-trigger${searchOpen ? ' active' : ''}`}
              aria-expanded={searchOpen}
              onClick={() => setSearchOpen(open => !open)}>
              Search
            </button>
            <SearchPanel open={searchOpen} onClose={() => setSearchOpen(false)} onSelect={scrollToProduct} />
          </div>
          <a className="nav-cta" href="index.html">Home</a>
          <button className="nav-cta">Enquire</button>
        </div>
      </nav>

      {/* Hero */}
      <section id="hero">
        <div className="hero-top-label">Architectural Lighting Collection</div>
        <div className="hero-year">Est. 2024</div>
        <div className="hero-left">
          <h1 className="hero-title">
            <span className="hero-title-line"><span className="hero-title-inner">HAZEN</span></span>
          </h1>
          <div className="hero-tagline">Radiance Redefined</div>
          <div className="hero-bottom">
            <p className="hero-desc">
              Explore the full Hazen catalogue across downlights, wall lighting, outdoor fixtures, track systems, decorative lighting, and pendants.
            </p>
            <div className="hero-scroll-indicator">
              <div className="hero-line-anim"></div>
              <span>Scroll</span>
            </div>
          </div>
        </div>
        <div className="hero-right" aria-hidden="true">
          <div className="hero-right-img"></div>
          <div className="hero-right-overlay"></div>
          <div className="hero-right-vignette"></div>
        </div>
      </section>

      {/* Product Sections */}
      {CATEGORIES.map((cat, i) => (
        <section key={cat.id} id={'cat-' + cat.id} data-cat-id={cat.id} className="cat-section">
          <div className="section-header">
            <div className="section-header-left">
              <div className="section-index">{String(i + 1).padStart(2, '0')} / 06</div>
              <h2 className="section-title">
                {cat.titleLine1}<br /><em>{cat.titleLine2}</em>
              </h2>
            </div>
            <div className="section-header-right">
              <p className="section-desc">{cat.desc}</p>
              <div className="section-count">{cat.products.length} products / {cat.variantCount} versions</div>
            </div>
          </div>

          <div className="product-grid">
            {cat.products.map(p => (
              <ProductCard
                key={p.sku}
                product={p}
                catLabel={cat.label}
                isHighlighted={highlightedProductId === p.id}
                onClick={(prod, lbl) => { setDetailProduct(prod); setDetailCat(lbl); }}
              />
            ))}
          </div>
        </section>
      ))}

      {/* Footer */}
      <footer>
        <div className="footer-logo">Hazen</div>
        <div className="footer-mid">
          <div className="footer-tagline">Radiance Redefined</div>
        </div>
        <div className="footer-copy">© 2025 Hazen Lighting</div>
      </footer>

      <DetailOverlay product={detailProduct} catLabel={detailCat} onClose={() => setDetailProduct(null)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
